    <text x="100" y="104" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#00C8FF" text-anchor="middle" letter-spacing="-0.5">AI Work</text>
    <text x="100" y="136" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="300" fill="#4ab8d8" text-anchor="middle" letter-spacing="10">OS</text>
  </g>
