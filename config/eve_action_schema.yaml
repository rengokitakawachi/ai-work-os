{
  "openapi": "3.1.0",
  "info": {
    "title": "AI Work OS API (EVE)",
    "version": "2.0.1",
    "description": "Todoist タスク管理 API（正式版）"
  },
  "servers": [
    {
      "url": "https://ai-work-os.vercel.app"
    }
  ],
  "security": [
    {
      "bearerAuth": []
    }
  ],
  "paths": {
    "/api/tasks": {
      "get": {
        "operationId": "listTasks",
        "summary": "タスク一覧を取得",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "project_id",
            "in": "query",
            "schema": { "type": "string" }
          },
          {
            "name": "section_id",
            "in": "query",
            "schema": { "type": "string" }
          },
          {
            "name": "parent_id",
            "in": "query",
            "schema": { "type": "string" }
          },
          {
            "name": "label",
            "in": "query",
            "schema": { "type": "string" }
          },
          {
            "name": "status",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": ["open"]
            }
          },
          {
            "name": "cursor",
            "in": "query",
            "schema": { "type": "string" }
          },
          {
            "name": "limit",
            "in": "query",
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 200
            }
          }
        ],
        "responses": {
          "200": {
            "description": "タスク一覧取得成功"
          }
        }
      },
      "post": {
        "operationId": "createTask",
        "summary": "タスクを作成",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateTaskRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "タスク作成成功"
          }
        }
      }
    },
    "/api/tasks/{id}": {
      "patch": {
        "operationId": "updateTask",
        "summary": "タスク更新・完了",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/UpdateTaskRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "タスク更新成功"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "CreateTaskRequest": {
        "type": "object",
        "required": ["title"],
        "properties": {
          "title": {
            "type": "string"
          },
          "description": {
            "type": "string"
          },
          "due_string": {
            "type": "string"
          },
          "labels": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "priority": {
            "type": "integer",
            "minimum": 1,
            "maximum": 4
          },
          "subtasks": {
            "type": "array",
            "items": {
              "type": "string"
            }
          }
        }
      },
      "UpdateTaskRequest": {
        "type": "object",
        "properties": {
          "title": {
            "type": "string"
          },
          "description": {
            "type": "string"
          },
          "due_date": {
            "type": "string"
          },
          "labels": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "priority": {
            "type": "integer",
            "minimum": 1,
            "maximum": 4
          },
          "status": {
            "type": "string",
            "enum": ["open", "closed"]
          }
        }
      }
    },
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "API Key"
      }
    }
  }
}
