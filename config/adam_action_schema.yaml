openapi: 3.1.0
info:
  title: AI Work OS ADAM Action API
  version: "2.3.0"
  description: ADAM GPT Actions for repo resources and Todoist projection.

servers:
  - url: https://ai-work-os.vercel.app

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          additionalProperties: true
        request_id:
          type: string

    GenericSuccess:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          additionalProperties: true
        request_id:
          type: string

    RepoWriteRequest:
      type: object
      additionalProperties: false
      properties:
        file:
          type: string
        content:
          type: string
        message:
          type: string
        sha:
          type: string
        branch:
          type: string
        from_branch:
          type: string

    TaskCreateRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        project_id:
          type: string
        due_string:
          type: string
        labels:
          type: array
          items:
            type: string
        priority:
          type: integer
          minimum: 1
          maximum: 4
        subtasks:
          type: array
          items:
            type: string

    TaskUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        description:
          type: string
        due_date:
          type: string
        labels:
          type: array
          items:
            type: string
        priority:
          type: integer
          minimum: 1
          maximum: 4
        status:
          type: string
          enum:
            - open
            - closed

    OperationTask:
      type: object
      additionalProperties: true
      properties:
        task:
          type: string
        source_ref:
          type: array
          items:
            type: string
        rolling_day:
          type: string
        due_date:
          type: string
        due_type:
          type: string
          enum:
            - date
            - deadline
        why_now:
          type: array
          items:
            type: string
        notes:
          type: array
          items:
            type: string
        status:
          type: string
        completed:
          type: boolean
        external:
          type: object
          additionalProperties: true

    ProjectTasksRequest:
      type: object
      additionalProperties: false
      required:
        - target
        - mode
        - current_active_tasks
      properties:
        target:
          type: string
          enum:
            - active
        mode:
          type: string
          enum:
            - dry_run
            - apply
        project_id:
          type: string
        previous_active_tasks:
          type: array
          items:
            $ref: "#/components/schemas/OperationTask"
        current_active_tasks:
          type: array
          items:
            $ref: "#/components/schemas/OperationTask"

paths:
  /api/docs:
    get:
      operationId: listDocsLegacy
      summary: List docs legacy endpoint
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/docs-read:
    get:
      operationId: readDocLegacy
      summary: Read one doc legacy endpoint
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/docs-bulk:
    get:
      operationId: readDocsBulkLegacy
      summary: Read multiple docs legacy endpoint
      security:
        - bearerAuth: []
      parameters:
        - name: files
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/repo-resource:
    get:
      operationId: repoResourceGet
      summary: Read docs, notes, code, delta, and repo metadata
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - list
              - tree
              - read
              - bulk
              - history
              - show
              - compare
              - diff
              - search
              - grep
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - docs
              - notes
              - code
              - delta
              - repo
        - name: file
          in: query
          required: false
          schema:
            type: string
        - name: files
          in: query
          required: false
          schema:
            type: string
        - name: branch
          in: query
          required: false
          schema:
            type: string
        - name: base
          in: query
          required: false
          schema:
            type: string
        - name: head
          in: query
          required: false
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: path
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: repoResourceWrite
      summary: Create, update, delete repo resources, or create feature branch
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - create
              - update
              - delete
              - create_branch
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - notes
              - code
              - repo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoWriteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tasks:
    get:
      operationId: listTasks
      summary: List Todoist tasks
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: false
          schema:
            type: string
        - name: section_id
          in: query
          required: false
          schema:
            type: string
        - name: parent_id
          in: query
          required: false
          schema:
            type: string
        - name: label
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - open
              - closed
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"

    post:
      operationId: createTask
      summary: Create Todoist task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"

  /api/tasks/project:
    post:
      operationId: projectTasks
      summary: Project operations tasks to Todoist execution view
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTasksRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"

  /api/tasks/{id}:
    patch:
      operationId: updateTask
      summary: Update or close Todoist task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericSuccess"
