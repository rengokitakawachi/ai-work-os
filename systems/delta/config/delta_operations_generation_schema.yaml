system_id: delta
schema_extension: operations_generation_engine
status: supplemental_schema_pending_canonical_merge

purpose:
  - daily_review後にroadmap/plan/current_positionからActive operations D0-D6を自律生成する
  - D7から中期目標日までのNext operationsを自律生成する
  - 定量目標、負荷現実性、特殊日、user_capacity、completed_scope、plan fitをwrite前に検証する
  - 既存active_operationsとNext operationsとの連続性を維持する
  - 一巡完了優先、canonical branch、L3選択先行ルールをhard guardとして強制する

non_negotiable_core_rules:
  first_pass_priority:
    rule: 一巡完了を最優先する
    prohibit_before_first_pass_complete:
      - 振り返り
      - 弱点回収
      - 誤答再演習
      - 復習
      - 2巡目
      - review
      - recovery_review
      - weak_point_recovery
      - second_pass
    allowed_only_if:
      - user_explicitly_overrides_for_the_day
    failure_policy: operations_incomplete_do_not_write
  canonical_branch:
    rule: DELTA operations canonical branch is feature/atlas-pre-delta-foundation
    default_branch: feature/atlas-pre-delta-foundation
    prohibit:
      - using_main_as_operations_ssot_without_explicit_user_instruction
      - writing_delta_operations_to_main
    failure_policy: stop_and_report_branch_violation
  L3_selection_before_takuitsu:
    rule: 各科目のL3は選択問題を先にし、択一問題は選択完了後に行う
    required_order:
      - 選択
      - 択一
    prohibit:
      - L3_択一_when_L3_選択_completion_unconfirmed
      - L3_択一_before_L3_選択_completed
    failure_policy: operations_incomplete_do_not_write

branch_resolution:
  canonical_branch_for_delta_runtime: feature/atlas-pre-delta-foundation
  read_order:
    - explicitly_provided_branch
    - branch_recorded_in_current_operations_or_prior_confirmed_sha
    - feature/atlas-pre-delta-foundation
    - main_as_diagnostic_fallback_only
  required_for:
    - daytime_recommendation
    - daily_review_operations_update
    - operations_generation
    - runtime_fixture
  failure_policy:
    - if_active_operations_cannot_be_read_from_any_candidate_branch_stop
    - if_branch_cannot_be_resolved_stop
    - do_not_generate_provisional_learning_lines
    - do_not_recompute_recommendation_without_saved_operations
    - report_branch_read_failure_and_required_next_action
    - do_not_treat_main_as_delta_operations_ssot_without_explicit_user_instruction

input_sources:
  required:
    - systems/delta/roadmap/delta_roadmap.md
    - systems/delta/plan/2026_sharoushi_exam_plan.md
    - systems/delta/operations/active_operations.md
    - systems/delta/operations/next_operations.md
    - systems/delta/history/daily/YYYY-MM-DD.md
  optional:
    - systems/delta/history/monthly/YYYY-MM.md
    - systems/delta/resources/materials.md

pre_generation_required_reads:
  - roadmap/delta_roadmap.md
  - plan/2026_sharoushi_exam_plan.md
  - operations/active_operations.md
  - operations/next_operations.md
  - latest_history_daily_YYYY_MM_DD
  - recent_daily_history_as_needed

hard_fail_if_missing:
  - active_operations
  - existing_active_operations_D0_D6
  - existing_next_operations_when_present
  - L1_L2_current_position
  - L3_current_position
  - L3_selected_completion_status_by_subject
  - first_pass_completion_status
  - completed_subjects
  - special_days
  - user_capacity

failure_policy: operations_incomplete_do_not_write

components:
  operation_rolling_window_generator:
    output: Active operations D0-D6
    required_days:
      - Day0
      - Day1
      - Day2
      - Day3
      - Day4
      - Day5
      - Day6
    required_fields_per_day:
      - plan_anchor
      - expected_position
      - current_position
      - gap_status
      - operation_mode
      - must_line
      - standard_line
      - stretch_line
      - recovery_targets
      - defer_targets
      - recompute_triggers
    failure_policy: operations_incomplete_do_not_write

  next_operations_projection_generator:
    output: Next operations D7-target_date
    required_when:
      - roadmap_or_plan_has_medium_target_date
      - target_date_is_beyond_D6
    example_target_date: 2026-06-30
    required_behavior:
      - read_existing_next_operations_before_regeneration
      - preserve_continuity_with_existing_active_operations
      - do_not_discard_existing_plan_without_recompute_reason
      - enforce_first_pass_priority_before_review_or_recovery
      - enforce_L3_selection_before_takuitsu_per_subject
    failure_policy: missing_next_operations_do_not_write_when_medium_target_exists

  daytime_recommendation_guard:
    required_behavior:
      - resolve_branch_before_reading_active_operations
      - read_operations_active_operations_md_from_resolved_branch
      - echo_observed_branch_and_sha
      - answer_from_matching_Day_block
      - output_exact_task_must_line_standard_line
      - verify_day_block_does_not_violate_non_negotiable_core_rules
    prohibit:
      - provisional_learning_line_when_read_failed
      - vague_fallback_plan
      - recomputed_recommendation_without_saved_operations
      - recommending_review_or_weak_point_recovery_before_first_pass_completion
      - recommending_L3_takuitsu_before_selected_completion
    failure_policy: stop_and_report_read_failure_or_rule_violation

  reverse_planning_engine:
    generation_order:
      - resolve_branch
      - read_roadmap_milestone
      - read_plan_intermediate_target
      - read_existing_active_operations
      - read_existing_next_operations
      - read_current_position
      - read_first_pass_completion_status
      - read_L3_selected_completion_status_by_subject
      - read_completed_scope
      - exclude_review_recovery_and_second_pass_until_first_pass_complete
      - exclude_completed_first_pass_scope
      - check_L1_L2_subject_continuity
      - check_L3_selection_before_takuitsu_order
      - expand_medium_plan_by_day
      - detect_overload
      - redistribute_overload
      - write_D0_D6_and_D7_target
    gap_status_outputs:
      - on_track
      - delayed_but_managed
      - delayed_but_recovering
      - recovery_on_track
      - compression_required
      - critical_delay
      - needs_confirmation

  first_pass_priority_guard:
    purpose: prevent DELTA from spending plan capacity on review before first pass is completed
    required_inputs:
      - roadmap_phase
      - target_date
      - first_pass_completion_status_by_subject
      - current_position
      - user_explicit_override
    first_pass_incomplete_if:
      - any_required_subject_first_pass_scope_incomplete
      - first_pass_completion_status_unknown
    prohibited_terms_before_first_pass_complete:
      - 振り返り
      - 弱点回収
      - 誤答再演習
      - 復習
      - 2巡目
      - review
      - recovery_review
      - weak_point_recovery
      - second_pass
    exception:
      user_explicit_override_required: true
      override_must_be_recorded_in_plan_anchor: true
      override_must_be_recorded_in_recompute_triggers: true
    violation_policy: operations_incomplete_do_not_write

  L1_L2_subject_continuity_guard:
    rule: current_subject_completed_until_end_page_before_next_subject
    required_inputs:
      - current_subject
      - next_start_page
      - subject_end_page
      - completion_status
    if_current_subject_incomplete:
      prohibit_next_subject: true
    if_next_start_page_unknown:
      gap_status: needs_confirmation
      operation_mode: blocked_current_position_unknown
      must_line: current_subject L1/L2 next_start_page確認
      write_allowed: false
    violation_policy: operations_incomplete_do_not_write
    current_known_case:
      国民年金法:
        L1:
          next_start_page: P220
          completion_status: incomplete
        L2:
          next_start_page: P158
          completion_status: incomplete
        prohibit_next_subject_L1_L2: 厚生年金保険法

  L3_order_guard:
    per_subject: true
    required_order:
      - 選択
      - 択一
    prohibit:
      - 択一_before_選択_completed
      - 択一_when_selected_completion_status_unknown
    required_inputs:
      - current_subject
      - selected_completion_status
      - next_question
    if_selected_completion_status_unknown:
      gap_status: needs_confirmation
      operation_mode: blocked_L3_selected_completion_unknown
      write_allowed: false
    violation_policy: operations_incomplete_do_not_write

  quantitative_target_validator:
    L1_L2_required_format: "科目 L1/L2 P開始〜P終了（nページ）"
    L3_required_format: "科目 L3 選択/択一 Q開始〜Q終了（n問）"
    forbidden_terms:
      - 前半
      - 後半
      - 終盤
      - 完了方向
      - 進める
      - 接続判断
      - 未消化ページ回収のみ
      - できるところまで
      - Qx以降
      - Qx-last
      - 章の最後まで
      - 択一入口
      - 着手
      - 未達分回収のみ
    forbidden_before_first_pass_complete:
      - 振り返り
      - 弱点回収
      - 誤答再演習
      - 復習
      - 2巡目
    explicit_exceptions:
      - 国民年金法 Q10-0 は演習対象なし
      - 健康保険法 Q5/Q6 は存在しない
      - 健康保険法 Q8 は演習対象なし

  completed_subject_guard:
    purpose: completed first-round subjects must not be regenerated as first-round work
    known_completed_subjects:
      健康保険法:
        first_round: completed
        prohibit:
          - 健康保険法 L3 1巡目 選択
          - 健康保険法 L3 1巡目 択一
        allowed_only_if_explicit:
          - 健康保険法 2巡目
          - 健康保険法 弱点回収
          - 健康保険法 誤答再演習
          - 健康保険法 recovery_targets
          - 健康保険法 deferred_review
    violation_policy: operations_incomplete_do_not_write

  completed_scope_exclusion_validator:
    purpose: completed first-pass scopes must not be regenerated as new work
    required_sources:
      - latest_daily_history
      - active_operations_current_position
      - active_operations_recovery_targets
    rules:
      - completed_first_pass_scope_is_excluded_from_new_operations
      - completed_subject_may_appear_only_as_recovery_review_or_second_pass_after_first_pass_completion_or_explicit_override
      - reference_tests_do_not_reopen_completed_L3_new_work
      - completed_scope_must_be_checked_before_D0_D6_and_D7_target_generation
    forbidden_after_completion:
      - new_first_pass_L3_operations
      - regenerated_operations_treating_completed_scope_as_unfinished
      - D7_target_projection_using_completed_scope_to_fill_capacity
    allowed_after_completion:
      - recovery_targets_only_after_first_pass_completion_or_explicit_override
      - defer_targets
      - second_pass_review_explicitly_labeled_after_first_pass_completion
      - reference_test_record
    known_completed_scope:
      as_of_2026_05_04:
        健康保険法:
          L3_new_exercises: completed
          completed_through: Q11-21
          selected_questions: completed
          next_new_L3_scope: 国民年金法 L3 選択問題

  load_realism_guard:
    thresholds:
      L1_L2_pages:
        standard: 40
        upper_guard: 50
      L3_selected_questions:
        standard: 24
      L3_multiple_choice_questions:
        standard: 16
        upper_guard: 25
      second_pass_sorting_questions:
        upper_guard: 30
    overload_resolution_order:
      - pull_forward_into_D0_D6
      - mix_L1_L2_after_light_L3_day
      - move_L3_to_weekend_or_annual_leave
      - respect_weekday_L3_unavailable_constraints
      - mark_compression_required_or_critical_delay

  special_day_constraint_handler:
    special_days:
      '2026-05-10':
        L3: unavailable
      '2026-06-13':
        L3: unavailable
      '2026-06-26':
        L3: unavailable
        reason: weekday
      '2026-06-30':
        L3: available
        reason: annual_leave

  user_capacity_profile:
    L3_selected_questions:
      standard: 24
    L3_multiple_choice_questions:
      standard: 16
    L1_L2_pages:
      standard: 40
      upper_guard: 50
    mixed_day:
      allowed: true
      rules:
        - L3選択後はL1/L2を20〜35ページ追加可能
        - L3択一が軽い日はL1/L2を15〜30ページ追加可能

  operations_write_preflight_check:
    required_checks:
      - active_operations_was_read
      - existing_next_operations_was_read_when_present
      - L1_L2_current_position_confirmed
      - L3_current_position_confirmed
      - first_pass_completion_status_confirmed
      - current_subject_not_skipped
      - completed_subject_not_reintroduced
      - first_pass_priority_not_violated
      - review_recovery_second_pass_absent_before_first_pass_completion_unless_user_override
      - L3_order_selection_before_takuitsu
      - D0_D6_all_exist
      - D7_target_next_operations_exists_when_medium_target_exists
      - L1_L2_page_range_format_valid
      - L3_question_range_format_valid
      - forbidden_vague_terms_absent
      - special_days_reflected
      - overload_detected
    structure_check:
      - D0_D6_exist
      - next_operations_exist_when_medium_target_exists
      - required_fields_per_day_exist
    quantitative_check:
      - L1_L2_has_page_range_and_count
      - L3_has_question_range_and_count
      - forbidden_terms_absent_from_task_and_lines
    current_position_check:
      - L1_L2_current_position_confirmed
      - L3_current_position_confirmed
      - current_subject_not_skipped
    first_pass_priority_check:
      - first_pass_completion_status_confirmed
      - no_review_recovery_second_pass_before_first_pass_completion_without_user_override
    completed_scope_check:
      - completed_first_pass_scope_not_in_new_operations
      - completed_subject_only_in_recovery_review_or_second_pass_after_first_pass_completion_or_user_override
      - health_insurance_L3_not_reopened_after_2026_05_04_completion
    order_check:
      - L3_selection_before_takuitsu_per_subject
    load_check:
      - L1_L2_above_50_pages_flagged_or_redistributed
      - L3_multiple_choice_above_25_questions_flagged_or_redistributed
      - second_pass_above_30_questions_split
    plan_fit_check:
      - roadmap_plan_milestone_reachable
      - unreachable_plan_uses_compression_required_or_critical_delay
      - recovery_forward_standard_line_matches_expected_position
    failure_policy: reject_write

previous_generation_status:
  status: invalid
  reason:
    - active_operations_not_read
    - next_operations_not_read
    - L1_L2_current_position_not_confirmed
    - current_L1_L2_subject_skipped
    - completed_health_insurance_reintroduced
    - L3_order_rule_violated
    - first_pass_priority_not_enforced
  write_allowed: false

acceptance_criteria:
  - branch_resolved_before_operations_read
  - feature_atlas_pre_delta_foundation_used_as_default_canonical_branch
  - branch_read_failure_stops_without_provisional_line
  - operations_active_operations_md_read_before_generation
  - existing_next_operations_read_before_generation
  - D0_D6_never_missing_after_daily_review
  - D7_target_next_operations_generated_when_medium_target_exists
  - L1_L2_page_range_and_page_count_required
  - L3_question_range_and_question_count_required
  - vague_targets_rejected
  - first_pass_completion_priority_enforced
  - review_recovery_second_pass_not_scheduled_before_first_pass_completion_without_user_override
  - current_L1_L2_subject_not_skipped
  - if_national_pension_L1_L2_incomplete_then_employee_pension_L1_L2_not_started
  - completed_first_pass_scope_excluded_from_new_operations
  - health_insurance_L3_not_reintroduced_as_new_work_after_2026_05_04
  - L3_selection_before_takuitsu_per_subject
  - L3_takuitsu_not_scheduled_when_selected_completion_status_unknown
  - load_guards_detect_overload
  - overload_redistributed_or_marked_compression_required
  - special_days_reflected
  - user_capacity_reflected
  - roadmap_plan_fit_judged

implementation_status:
  repo_config_instruction: updated
  supplemental_schema: updated_with_non_negotiable_core_rules
  service_preflight_validator: needs_update_for_first_pass_priority_runtime_enforcement
  deterministic_generator_service: minimum_service_created_tests_pending
  runtime_reflection: needs_fixture_after_runtime_validator_update
  fixture: core_rules_fixture_pending
