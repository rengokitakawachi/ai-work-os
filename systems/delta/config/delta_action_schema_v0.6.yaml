openapi: 3.1.0
info:
  title: DELTA Resource API
  version: "0.6.0"
  description: Read DELTA resources and create/update DELTA daily history files via /api/repo-resource.

servers:
  - url: https://ai-work-os.vercel.app

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          additionalProperties: true
          properties:
            code:
              type: string
            message:
              type: string
            category:
              type: string
            step:
              type: string
            resource:
              type: string
            action:
              type: string
            status:
              type: integer
            retryable:
              type: boolean
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
        request_id:
          type: string
      required:
        - ok
        - error

    DeltaReadResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaHistoryWriteResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          type: object
          additionalProperties: true
          properties:
            resource:
              type: string
              enum:
                - delta_history
            root:
              type: string
              enum:
                - systems/delta/history/
            path:
              type: string
            sha:
              type: string
            branch:
              type: string
            status:
              type: string
              enum:
                - CREATED
                - UPDATED
            write_scope:
              type: string
        request_id:
          type: string
      required:
        - ok
        - data

security:
  - bearerAuth: []

paths:
  /api/repo-resource:
    get:
      operationId: deltaResourceGet
      summary: Read DELTA files under systems/delta
      description: Read-only access to DELTA resources. Always set resource=delta. File paths are relative to systems/delta/.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - tree
              - read
              - bulk
        - name: file
          in: query
          required: false
          schema:
            type: string
          description: Relative path under systems/delta/, e.g. operations/active_operations.md.
        - name: files
          in: query
          required: false
          schema:
            type: string
          description: Comma or newline separated relative paths under systems/delta/.
        - name: branch
          in: query
          required: false
          schema:
            type: string
          description: Optional Git branch selector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaReadResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: deltaHistoryWrite
      summary: Create or update DELTA history markdown files
      description: Create or update markdown files under systems/delta/history/. Always set resource=delta_history. File paths are relative to systems/delta/history/.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta_history
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - create
              - update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                file:
                  type: string
                  description: Relative path under systems/delta/history/, e.g. daily/2026-05-02.md.
                content:
                  type: string
                  description: Full markdown content to create or replace.
                message:
                  type: string
                sha:
                  type: string
                branch:
                  type: string
              required:
                - file
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaHistoryWriteResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
