openapi: 3.1.0
info:
  title: DELTA Resource API
  version: "0.6.1"
  description: Read DELTA resources, write DELTA daily history, and update DELTA active operations via /api/repo-resource.

servers:
  - url: https://ai-work-os.vercel.app

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          additionalProperties: true
        request_id:
          type: string
      required:
        - ok
        - error

    DeltaReadResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaWriteResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          type: object
          additionalProperties: true
          properties:
            resource:
              type: string
              enum:
                - delta_history
                - delta_operations
            root:
              type: string
            path:
              type: string
            sha:
              type: string
            branch:
              type: string
            status:
              type: string
              enum:
                - CREATED
                - UPDATED
            write_scope:
              type: string
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaWriteRequest:
      type: object
      additionalProperties: false
      properties:
        file:
          type: string
          description: Relative path under selected DELTA write root. Use daily/YYYY-MM-DD.md for delta_history or active_operations.md for delta_operations.
        content:
          type: string
          description: Full markdown content to create or replace.
        message:
          type: string
        sha:
          type: string
        branch:
          type: string
      required:
        - file
        - content

paths:
  /api/repo-resource:
    get:
      operationId: deltaResourceGet
      summary: Read DELTA files under systems/delta
      description: Read-only access to DELTA resources. Always set resource=delta. File paths are relative to systems/delta/.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - tree
              - read
              - bulk
        - name: file
          in: query
          required: false
          schema:
            type: string
        - name: files
          in: query
          required: false
          schema:
            type: string
        - name: branch
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaReadResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: deltaResourceWrite
      summary: Write DELTA daily history or active operations
      description: Use resource=delta_history with action=create/update for history files, or resource=delta_operations with action=update for operations/active_operations.md. Do not store actual performance records in operations.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta_history
              - delta_operations
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - create
              - update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeltaWriteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaWriteResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
