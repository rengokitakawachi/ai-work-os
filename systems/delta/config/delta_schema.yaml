system_id: delta
code_name: delta
purpose: learning_support
exam:
  name: 社会保険労務士試験
  date: 2026-08-23
version_scope:
  current_target: v0.6_integrated_operations_upgrade
  scope:
    - daily_history_primary_source
    - plan_gap_check
    - progress_granularity
    - recommended_lines
    - daily_review_operations_update
    - operation_generation_judgment_regression_guard
    - todoist_projection
    - l3_difficulty_estimated_time_recording
    - recovery_line_calibration_guard
resources:
  docs: systems/delta/docs
  roadmap: systems/delta/roadmap
  plan: systems/delta/plan
  operations: systems/delta/operations
  operations_active: systems/delta/operations/active_operations.md
  history: systems/delta/history
  history_daily: systems/delta/history/daily
  history_monthly: systems/delta/history/monthly
  history_legacy_monthly: systems/delta/history/YYYY-MM.md
  review: systems/delta/review
  review_weekly: systems/delta/review/weekly
  review_monthly: systems/delta/review/monthly
  materials: systems/delta/resources/materials.md
write_resources:
  delta_history:
    root: systems/delta/history/
    actions:
      - create
      - update
    role: actual_history_write
  delta_operations:
    root: systems/delta/operations/
    allowed_files:
      - active_operations.md
    actions:
      - update
    role: next_action_operations_update
models:
  LearningOperationTask:
    base_fields:
      - task
      - source_ref
      - rolling_day
      - due_date
      - due_type
      - why_now
      - notes
      - status
      - completed
    required_delta_fields_for_daily_task:
      - plan_anchor
      - expected_position
      - current_position
      - gap_status
      - operation_mode
      - must_line
      - standard_line
      - stretch_line
      - recovery_targets
      - defer_targets
      - recompute_triggers
    delta_fields:
      - subject
      - topic
      - material
      - study_type
      - estimated_minutes
      - page_range
      - next_start_page
      - questions
      - question_range
      - next_question
      - start_question_id
      - must_end_question_id
      - standard_end_question_id
      - stretch_end_question_id
      - next_resume_question_id
      - plan_anchor
      - current_position
      - actual_position
      - expected_position
      - gap_status
      - operation_mode
      - recovery_required
      - survival_line
      - plan_minimum_line
      - must_line
      - standard_line
      - stretch_line
      - recovery_targets
      - defer_targets
      - defer
      - recompute_triggers
      - next_review_checkpoint
      - recommended_lines
      - uncertainty
      - external
    source_of_truth:
      role: next_action_source
      rule: operations stores what to do next, not actual performance records
    validation_rules:
      - daily_operations_missing_plan_anchor_are_incomplete
      - L3_operations_must_use_real_question_ids
      - vague_L3_targets_are_warning_or_invalid
      - health_insurance_exceptions_must_be_applied
      - recovery_standard_line_must_match_plan_expected_position
      - plan_expected_position_must_not_be_only_in_stretch_line
      - must_line_must_not_be_survival_line_only

  OperationGenerationGuard:
    required_daily_operation_fields:
      - plan_anchor
      - expected_position
      - current_position
      - gap_status
      - operation_mode
      - must_line
      - standard_line
      - stretch_line
      - recovery_targets
      - defer_targets
      - recompute_triggers
    two_layer_judgment:
      fields:
        - daily_execution_status
        - plan_alignment_status
        - judgment
      rule: user_execution_can_be_completed_while_plan_alignment_is_delayed
    on_track_strict_conditions:
      - daily_task_completed
      - current_position_not_materially_behind_expected_position
      - no_additional_recovery_required_for_tomorrow_or_later
    delayed_allowed_judgments:
      - delayed_but_managed
      - delayed_but_recovering
      - recovery_on_track
    recovery_line_calibration:
      trigger_gap_status:
        - delayed_but_recovering
        - delayed_but_managed
        - recovery_on_track
      trigger_operation_mode:
        - recovery_forward
        - recovery_required
        - compression_required
      rule: standard_line_must_represent_plan_anchor_expected_position_for_that_day
      constraints:
        - do_not_place_plan_expected_position_only_in_stretch_line
        - must_line_should_be_plan_minimum_line_not_survival_line
        - survival_line_must_be_separate_when_needed
        - intermediate_safe_line_belongs_to_must_line_or_plan_minimum_line
        - stretch_line_is_for_delay_recovery_next_day_connection_or_forward_acceleration
      line_roles:
        survival_line: zero_prevention_minimum_for_illness_work_or_unexpected_constraints
        must_line: plan_minimum_line_to_avoid_plan_collapse
        plan_minimum_line: minimum_required_to_avoid_plan_collapse
        standard_line: plan_achievement_line_matching_plan_anchor_expected_position
        stretch_line: delay_recovery_or_next_plan_connection_beyond_daily_target
      pre_write_validation:
        - plan_anchor_expected_position_exists
        - current_position_specific_by_question_id_question_range_or_page_range_next_start_page
        - recovery_status_standard_line_matches_expected_position
        - daily_plan_target_not_only_in_stretch_line
        - must_line_not_merely_survival_line
      failure_policy: generated_operation_is_incomplete_and_must_be_regenerated_before_write
    L3_operation_target_fields:
      - start_question_id
      - must_end_question_id
      - standard_end_question_id
      - stretch_end_question_id
      - next_resume_question_id
    vague_L3_targets:
      - Q3以降
      - Q4の途中
      - できるところまで
      - chapter_only
    health_insurance_exceptions:
      missing_questions:
        - Q5
        - Q6
      no_exercise_target:
        - Q8
      transitions:
        Q4-10: Q7
        Q7: Q9

  DailyReviewOperationsUpdate:
    trigger:
      - user_says_today_finished
      - study_time_recorded
      - sokutore_completion_recorded
      - daily_history_judgment_fixed
      - daily_history_next_action_fixed
      - delta_declares_daily_history_confirmed
    required_read_set:
      - roadmap
      - plan
      - operations
      - daily_history_for_target_date
      - recent_daily_history_as_needed
      - monthly_summary_as_summary_or_fallback
      - legacy_monthly_as_migration_fallback_only
    flow:
      - confirm_or_update_daily_history
      - confirm_study_time_L1_L2_L3_sokutore
      - confirm_two_layer_judgment_and_next_action_candidates
      - compare_expected_position_and_current_position
      - validate_recovery_line_calibration_before_operations_write
      - update_active_operations
      - report_history_sha_and_operations_sha
    output_fields:
      - next_day_main_objective
      - plan_anchor
      - current_position
      - expected_position
      - gap_status
      - operation_mode
      - survival_line
      - plan_minimum_line
      - must_line
      - standard_line
      - stretch_line
      - recovery_targets
      - defer_targets
      - recompute_triggers
      - next_review_checkpoint
    write_target:
      resource: delta_operations
      file: active_operations.md
      canonical_path: systems/delta/operations/active_operations.md
    rules:
      - daily_review_is_not_complete_after_history_write_alone
      - active_operations_must_be_updated_after_daily_history_confirmation
      - tomorrow_questions_read_saved_operations_not_recomputed_by_default
      - actual_performance_records_remain_in_daily_history
      - on_track_requires_plan_alignment_not_only_daily_execution
      - recovery_standard_line_must_match_plan_anchor_expected_position
      - plan_expected_position_must_not_be_only_in_stretch_line
      - must_line_must_not_be_survival_line_only
      - invalid_recovery_line_calibration_blocks_operations_write

  ProgressPosition:
    fields:
      - study_type
      - subject
      - material
      - chapter
      - topic
      - page_range
      - next_start_page
      - questions
      - question_id
      - question_range
      - next_question
      - start_question_id
      - next_resume_question_id
      - as_of
      - source_ref
      - uncertainty
    rules:
      - L1_L2_use_page_range_and_next_start_page
      - L3_uses_question_id_questions_and_next_question
      - chapter_is_context_not_progress_ssot

  PlanGapCheck:
    required_read_set:
      - roadmap
      - plan
      - operations
      - latest_daily_history
      - monthly_summary_as_summary_or_fallback
      - legacy_monthly_as_migration_fallback_only
    fields:
      - plan_target_by_date
      - expected_position
      - actual_as_of_date
      - current_position
      - actual_position_source
      - daily_execution_status
      - plan_alignment_status
      - judgment
      - gap_status
      - operation_mode
      - recovery_required
      - uncertainty
    line_definitions:
      survival_line: zero_prevention_minimum
      plan_minimum_line: minimum_required_to_avoid_plan_collapse
      must_line: plan_minimum_line_for_user_facing_must_when_delayed
      standard_line: plan_achievement_line_matching_expected_position_when_recovering
      stretch_line: optional_recovery_acceleration_or_next_plan_connection

  RecommendedLines:
    storage:
      primary: systems/delta/operations/active_operations.md
      generated_at: daily_review
    fields:
      - fixed_at
      - source_review
      - plan_anchor
      - current_position
      - expected_position
      - gap_status
      - operation_mode
      - survival_line
      - plan_minimum_line
      - must_line
      - standard_line
      - stretch_line
      - defer
      - recompute_triggers
      - revision_history
    daytime_rule:
      default_behavior: recall_saved_lines_without_recompute
      recompute_only_with_trigger: true
    validation_rules:
      - recovery_standard_line_matches_plan_anchor_expected_position
      - plan_target_not_escaped_to_stretch_line
      - must_line_is_plan_minimum_not_survival_line

  LearningHistory:
    storage:
      primary_daily_path_pattern: systems/delta/history/daily/YYYY-MM-DD.md
      monthly_summary_path_pattern: systems/delta/history/monthly/YYYY-MM.md
      legacy_monthly_path_pattern: systems/delta/history/YYYY-MM.md
      format: markdown_with_delta_meta_yaml
      daily_section_unit: one_day
      monthly_role: summary_view
      legacy_role: migration_source
    source_of_truth:
      primary_actual_record: daily_history
      monthly_summary: derived_view
      legacy_monthly: fallback_or_migration_source
      human_readable: markdown_body
      machine_aggregation: DELTA_META
      mismatch_policy: daily_review_correction
    daily_markdown_sections:
      - 実績
      - L1実績
      - L2実績
      - L3実績
      - 秒トレ実績
      - study_time
      - 計画との差分
      - 判断
      - 弱点
      - 次アクション
      - メモ
      - DELTA_META
    judgment_fields:
      - daily_execution_status
      - plan_alignment_status
      - judgment
    actual_results_fields:
      - study_type
      - subject
      - material
      - chapter
      - topic
      - planned_scope
      - actual_scope
      - page_range
      - next_start_page
      - questions
      - question_id
      - question_range
      - next_question
      - source_page
      - difficulty
      - estimated_time
      - actual_time
      - time_delta
      - estimate_source_status
      - time_analysis
      - result
      - comprehension
      - weak_points
      - answer_score
      - answer_notes
      - evaluation_basis
      - review_mark
      - review_marks
      - next_review_target
      - next_review_targets
      - uncertainty
    one_question_l3_write_rule:
      write_target: systems/delta/history/daily/YYYY-MM-DD.md
      do_not_write:
        - systems/delta/history/monthly/YYYY-MM.md
        - systems/delta/history/YYYY-MM.md
        - systems/delta/operations/active_operations.md

  L3QuestionRecord:
    required_fields:
      - question_id
      - source_page
      - difficulty
      - estimated_time
      - actual_time
      - time_delta
      - result
      - review_mark
      - next_review_target
      - time_analysis
      - estimate_source_status
    optional_fields:
      - subject
      - material
      - chapter
      - source_ref
      - confidence
      - next_action
    rules:
      - question_id_is_required
      - difficulty_and_estimated_time_should_be_checked_from_problem_header
      - actual_time_is_user_reported_when_available
      - time_delta_is_actual_time_minus_estimated_time
      - review_mark_remains_understanding_based_ssot
      - score_correctness_actual_time_and_time_delta_are_supplemental
      - if_estimate_unconfirmed_record_status_and_next_action
      - do_not_infer_difficulty_or_estimated_time_without_source
    confirmed_examples:
      - question_id: Q3-4
        source_page: P38
        difficulty: C
        estimated_time: 3分20秒
        actual_time: 2分39秒
        time_delta: -41秒
        result: correct
        review_mark: ○
      - question_id: Q4-5
        source_page: P50
        difficulty: B
        estimated_time: 2分50秒
        actual_time: 3分32秒
        time_delta: +42秒
        result: incorrect
        review_mark: ×
        next_review_target: priority_1_cross

  Review:
    storage:
      weekly_path_pattern: systems/delta/review/weekly/YYYY-Www.md
      monthly_path_pattern: systems/delta/review/monthly/YYYY-MM.md
    role: judgment_layer
    records:
      - weekly_review
      - monthly_review
      - delay_judgment
      - plan_revision_judgment
      - operations_change_reason
    rules:
      - review_is_not_raw_performance_history
      - review_may_update_operations_during_daily_or_weekly_review

  TodoistProjection:
    role: projection
    canonical_source: systems/delta/operations/active_operations.md
    fields:
      - projection_profile
      - project_id
      - labels
      - due_date
      - due_type
      - description
      - external.todoist_task_id
    rules:
      - todoist_is_not_canonical
      - dry_run_and_apply_are_separate
      - write_back_todoist_task_id_after_apply_when_possible

allowed_values:
  day_type:
    - weekday
    - weekend
    - holiday
    - exception
    - weekend_gw_l3_focus
    - mixed
  study_type:
    - L1
    - L2
    - L3
    - 秒トレ
    - review
    - other
  result:
    - correct
    - incorrect
    - complete
    - partial
    - skipped
    - provisional
  daily_execution_status:
    - completed
    - partial
    - skipped
    - overdone
    - uncertain
  plan_alignment_status:
    - ahead
    - on_track
    - delayed
    - critical_delay
    - uncertain
    - needs_confirmation
  difficulty:
    - A
    - B
    - C
    - D
    - 未確認
  estimate_source_status:
    - confirmed_from_problem_header
    - confirmed_by_user_page_recheck
    - page_identified_header_not_extracted
    - search_hit_answer_tail_only
    - search_hit_next_question_header
    - not_found
    - 未確認
  judgment_status:
    - ahead
    - on_track
    - slight_delay
    - delayed
    - critical_delay
    - delayed_but_managed
    - delayed_but_recovering
    - recovery_on_track
    - partial_must_line_reached
    - overdone
    - uncertain
    - needs_confirmation
  gap_status:
    - ahead
    - on_track
    - delayed
    - critical_delay
    - delayed_but_managed
    - delayed_but_recovering
    - recovery_on_track
    - uncertain
    - needs_confirmation
  operation_mode:
    - normal
    - recovery_required
    - recovery_forward
    - compression_required
    - confirmation_required
  evaluation_basis:
    - understanding
  l3_review_priority:
    - cross
    - triangle
    - circle
    - double_circle
  uncertainty_type:
    - page_range_unknown
    - question_range_unknown
    - study_type_unknown
    - material_unknown
    - actual_position_uncertain
    - difficulty_unknown
    - estimated_time_unknown
  due_type:
    - date
    - deadline
  projection_profile:
    - delta

rules:
  history:
    - daily_history_is_primary_source_of_truth
    - monthly_history_is_summary_view
    - legacy_monthly_history_is_migration_source
    - operations_do_not_store_actual_performance
    - one_question_l3_records_update_daily_history_only
    - monthly_summary_is_not_updated_for_each_one_question_record
    - review_is_judgment_layer_not_raw_history
  daily_review:
    - daily_review_must_update_active_operations_after_history_confirmation
    - operations_update_phase_runs_on_day_closure
    - report_both_history_sha_and_operations_sha
    - tomorrow_questions_read_saved_operations
    - recovery_line_calibration_required_before_operations_write
  judgment:
    - separate_daily_execution_status_and_plan_alignment_status
    - on_track_requires_daily_completion_and_plan_alignment
    - completed_execution_can_still_be_delayed_plan_alignment
  plan_gap:
    - plan_gap_check_required_before_daily_operations_generation
    - read_roadmap_plan_operations_latest_daily_history_before_proposal
    - compare_precise_units_not_chapter_only
    - mark_uncertain_when_precise_position_missing
    - survival_line_and_plan_minimum_line_are_separate
    - recovery_standard_line_matches_plan_anchor_expected_position
    - plan_expected_position_not_placed_only_in_stretch_line
    - must_line_is_plan_minimum_not_survival_line
  progress_granularity:
    - L1_L2_use_page_range_and_next_start_page
    - L3_uses_question_id_questions_and_next_question
    - chapter_is_context_only
    - chapter_only_input_must_be_normalized_or_marked_uncertain
  recommended_lines:
    - generated_at_daily_review
    - stored_in_active_operations
    - daytime_recall_does_not_recompute_by_default
    - recompute_requires_trigger
    - recovery_standard_line_matches_plan_anchor_expected_position
    - plan_target_not_escaped_to_stretch_line
    - must_line_is_plan_minimum_not_survival_line
  l3:
    - L3_is_question_number_based
    - L3_operations_must_use_real_question_ids
    - vague_L3_targets_are_warning_or_invalid
    - each_question_has_understanding_based_review_mark
    - difficulty_and_estimated_time_are_standard_fields
    - time_delta_is_recorded_when_actual_time_and_estimated_time_are_available
    - answer_score_correctness_actual_time_and_time_delta_are_supplemental
    - review_mark_is_not_auto_determined_from_score_or_time
    - unconfirmed_estimate_requires_estimate_source_status_and_next_action
    - problem_header_must_be_checked_not_only_answer_tail
    - health_insurance_Q5_Q6_do_not_exist
    - health_insurance_Q8_is_not_exercise_target
    - health_insurance_Q4_10_next_is_Q7
    - health_insurance_Q7_next_is_Q9
  projection:
    - todoist_is_projection_not_canonical
    - operations_must_be_updated_before_projection
    - dry_run_success_is_not_apply_success
    - apply_success_is_not_write_back_success
    - todoist_task_id_write_back_required_to_claim_projection_sync
  output:
    - conclusion_first_then_reason
    - separate_plan_actual_judgment_next_action
    - avoid_nested_fenced_code_blocks_in_long_form_requests
