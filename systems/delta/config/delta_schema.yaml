system_id: delta
code_name: delta
purpose: learning_support
exam:
  name: 社会保険労務士試験
  date: 2026-08-23
resources:
  docs: systems/delta/docs
  roadmap: systems/delta/roadmap
  plan: systems/delta/plan
  operations: systems/delta/operations
  history: systems/delta/history
  review: systems/delta/review
  materials: systems/delta/resources/materials.md
models:
  LearningOperationTask:
    base_fields:
      - task
      - source_ref
      - rolling_day
      - due_date
      - due_type
      - why_now
      - notes
      - status
      - completed
    delta_fields:
      - subject
      - topic
      - material
      - study_type
      - estimated_minutes
      - target_score
      - actual_score
      - comprehension
      - next_review_date
      - weak_point_ref
  LearningHistory:
    storage:
      path_pattern: systems/delta/history/YYYY-MM.md
      format: markdown_with_delta_meta_yaml
      section_unit: one_day
      append_order: date_ascending
    source_of_truth:
      human_readable: markdown_body
      machine_aggregation: DELTA_META
      mismatch_policy: daily_review_correction
    markdown_sections:
      - 実績
      - 計画との差分
      - 判断
      - 弱点
      - 次アクション
      - メモ
      - DELTA_META
    delta_meta_fields:
      - date
      - day_type
      - actual_results
      - judgment
      - next_action
      - source_ref
    actual_results_fields:
      - study_type
      - subject
      - material
      - planned_scope
      - actual_scope
      - result
      - comprehension
      - weak_points
    allowed_values:
      day_type:
        - weekday
        - weekend
        - holiday
        - exception
      study_type:
        - L1
        - L2
        - L3
        - 秒トレ
        - review
        - other
      result:
        - complete
        - partial
        - skipped
      comprehension:
        - high
        - medium
        - low
        - unknown
      judgment_status:
        - on_track
        - slight_delay
        - delay
        - overdone
rules:
  history:
    - operations には実績を書かず、実績は history に集約する
    - review には週次・月次レビューや弱点集約を置く
    - DELTA_META は進捗集計、遅れ検知、弱点抽出、次アクション生成に使う
