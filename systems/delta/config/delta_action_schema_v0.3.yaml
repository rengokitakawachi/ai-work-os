openapi: 3.1.0
info:
  title: DELTA History Write API
  version: "0.3.0"
  description: Read DELTA resources and create/update DELTA history markdown files under systems/delta/history/ via /api/repo-resource.

servers:
  - url: https://ai-work-os.vercel.app

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    ErrorObject:
      type: object
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
        category:
          type: string
        step:
          type: string
        resource:
          type: string
          enum:
            - delta
            - delta_history
        action:
          type: string
        status:
          type: integer
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
      required:
        - code
        - message

    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ErrorObject"
        request_id:
          type: string
      required:
        - ok
        - error

    DeltaReadData:
      type: object
      additionalProperties: true
      properties:
        resource:
          type: string
          enum:
            - delta
        root:
          type: string
          enum:
            - systems/delta/
        branch:
          type: string
        path:
          type: string
        name:
          type: string
        sha:
          type: string
        content:
          type: string
        read_only:
          type: boolean
          const: true

    DeltaReadResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaHistoryWriteData:
      type: object
      additionalProperties: true
      properties:
        resource:
          type: string
          enum:
            - delta_history
        root:
          type: string
          enum:
            - systems/delta/history/
        path:
          type: string
          description: Full repository path under systems/delta/history/.
        sha:
          type: string
        branch:
          type: string
        status:
          type: string
          enum:
            - CREATED
            - UPDATED
        write_scope:
          type: string
          enum:
            - systems/delta/history/*.md
      required:
        - resource
        - root
        - path
        - sha
        - status
        - write_scope

    DeltaHistoryWriteResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/DeltaHistoryWriteData"
        request_id:
          type: string
      required:
        - ok
        - data

security:
  - bearerAuth: []

paths:
  /api/repo-resource:
    get:
      operationId: deltaResourceGet
      summary: Read DELTA resources only
      description: |
        Read-only access to files under systems/delta/ using the shared repo-resource endpoint.
        Always set resource=delta.
        The file and files parameters must be relative to systems/delta/.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - tree
              - read
              - bulk
        - name: file
          in: query
          required: false
          schema:
            type: string
          description: Relative file path under systems/delta/, e.g. history/2026-04.md.
        - name: files
          in: query
          required: false
          schema:
            type: string
          description: Comma or newline separated relative file paths under systems/delta/.
        - name: branch
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaReadResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: deltaHistoryWrite
      summary: Create or update DELTA history markdown files only
      description: |
        Create or update markdown files under systems/delta/history/ only.
        Always set resource=delta_history.
        Allowed actions are create and update.
        The file parameter must be relative to systems/delta/history/ and must end with .md.
        Operations writes, deletes, and arbitrary systems/delta writes are intentionally not exposed in v0.3.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta_history
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - create
              - update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                file:
                  type: string
                  description: Relative path under systems/delta/history/, e.g. 2026-04.md.
                content:
                  type: string
                  description: Full markdown file content to create or replace.
                message:
                  type: string
                  description: Optional commit message.
                sha:
                  type: string
                  description: Optional current file SHA for update.
                branch:
                  type: string
                  description: Optional Git branch selector.
              required:
                - file
                - content
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaHistoryWriteResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
