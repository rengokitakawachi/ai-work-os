openapi: 3.1.0
info:
  title: DELTA Read-only Resource API
  version: "0.2.1"
  description: Read-only GitHub resource access for DELTA learning system under systems/delta/ via /api/repo-resource.

servers:
  - url: https://ai-work-os.vercel.app

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    ErrorObject:
      type: object
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
        category:
          type: string
        step:
          type: string
        resource:
          type: string
          enum:
            - delta
        action:
          type: string
        status:
          type: integer
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
      required:
        - code
        - message

    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          $ref: "#/components/schemas/ErrorObject"
        request_id:
          type: string
      required:
        - ok
        - error

    DeltaTreeItem:
      type: object
      additionalProperties: true
      properties:
        path:
          type: string
          description: Full repository path under systems/delta/.
        name:
          type: string
        type:
          type: string
          enum:
            - file
            - dir
        sha:
          type: string

    DeltaTreeData:
      type: object
      additionalProperties: true
      properties:
        resource:
          type: string
          enum:
            - delta
        root:
          type: string
          enum:
            - systems/delta/
        branch:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/DeltaTreeItem"
        count:
          type: integer
        read_only:
          type: boolean
          const: true
      required:
        - resource
        - root
        - read_only

    DeltaTreeResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/DeltaTreeData"
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaFileReadData:
      type: object
      additionalProperties: true
      properties:
        resource:
          type: string
          enum:
            - delta
        root:
          type: string
          enum:
            - systems/delta/
        name:
          type: string
        path:
          type: string
        sha:
          type: string
        size:
          type: integer
        branch:
          type: string
        content:
          type: string
        content_length:
          type: integer
        fetched_at:
          type: string
        status:
          type: string
        read_only:
          type: boolean
          const: true
      required:
        - resource
        - root
        - path
        - content
        - read_only

    DeltaFileReadResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/DeltaFileReadData"
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaBulkItem:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        file:
          type: string
          description: Path relative to systems/delta/.
        resource:
          type: string
          enum:
            - delta
        root:
          type: string
          enum:
            - systems/delta/
        name:
          type: string
        path:
          type: string
        sha:
          type: string
        size:
          type: integer
        branch:
          type: string
        content:
          type: string
        content_length:
          type: integer
        fetched_at:
          type: string
        status:
          type: string
        read_only:
          type: boolean
          const: true
        error:
          type: object
          additionalProperties: true

    DeltaBulkResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/DeltaBulkItem"
        request_id:
          type: string
      required:
        - ok
        - data

    DeltaResourceGetResponse:
      oneOf:
        - $ref: "#/components/schemas/DeltaTreeResponse"
        - $ref: "#/components/schemas/DeltaFileReadResponse"
        - $ref: "#/components/schemas/DeltaBulkResponse"

security:
  - bearerAuth: []

paths:
  /api/repo-resource:
    get:
      operationId: deltaResourceGet
      summary: Read DELTA resources only
      description: |
        Read-only access to files under systems/delta/ using the shared repo-resource endpoint.
        Always set resource=delta.
        The file and files parameters must be relative to systems/delta/.
        Write actions are intentionally not exposed in v0.2.
      security:
        - bearerAuth: []
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            enum:
              - delta
          description: Must be delta.
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum:
              - tree
              - read
              - bulk
        - name: file
          in: query
          required: false
          schema:
            type: string
          description: Relative file path under systems/delta/, e.g. operations/active_operations.md.
        - name: files
          in: query
          required: false
          schema:
            type: string
          description: Comma or newline separated relative file paths under systems/delta/.
        - name: branch
          in: query
          required: false
          schema:
            type: string
          description: Optional Git branch selector. For v0.2 testing, use feature/atlas-pre-delta-foundation.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeltaResourceGetResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
